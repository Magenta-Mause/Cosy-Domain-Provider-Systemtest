# Vorlage für das CronJob-Secret. NICHT mit echten Werten committen.
#
# Einmalig anlegen (Werte einsetzen):
#
#   kubectl create namespace cosy-systemtest
#   kubectl -n cosy-systemtest create secret generic cosy-systemtest-secrets \
#     --from-literal=STAGING_AUTH_USERNAME=... \
#     --from-literal=STAGING_AUTH_PASSWORD=... \
#     --from-literal=MAIL_SERVICE_API_KEY=... \
#     --from-literal=ADMIN_PORTAL_API_KEY=... \
#     --from-literal=PUSHGATEWAY_USERNAME=... \
#     --from-literal=PUSHGATEWAY_PASSWORD=...
#
# (PUSHGATEWAY_USERNAME/PASSWORD nur nötig, wenn der Pushgateway-Ingress per
#  Basic-Auth geschützt ist — empfohlen.)
apiVersion: v1
kind: Secret
metadata:
  name: cosy-systemtest-secrets
  namespace: cosy-systemtest
type: Opaque
stringData:
  STAGING_AUTH_USERNAME: "REPLACE_ME"
  STAGING_AUTH_PASSWORD: "REPLACE_ME"
  MAIL_SERVICE_API_KEY: "REPLACE_ME"
  ADMIN_PORTAL_API_KEY: "REPLACE_ME"
  PUSHGATEWAY_USERNAME: "REPLACE_ME"
  PUSHGATEWAY_PASSWORD: "REPLACE_ME"
