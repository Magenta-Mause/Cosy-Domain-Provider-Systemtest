name: Playwright Tests (Staging)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

concurrency:
  group: playwright-staging
  cancel-in-progress: false

# Fixture-User scharfschalten: Repo-Variable USE_FIXTURE_USERS=1 setzen, NACHDEM die
# FIXTURE_USER_DEFAULT_*/FIXTURE_USER_STRIPE_*-Secrets via provision:fixture-users
# angelegt wurden. Solange die Variable nicht gesetzt ist, laufen default/stripe mit
# dem bisherigen ephemeren User-Flow.
jobs:
  test:
    name: ${{ matrix.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - suite: default
            script: test:staging
            extra_env: {}
          - suite: mail
            script: test:staging:mail-only
            extra_env:
              RUN_MAIL_FLOW_TESTS: '1'
          - suite: mfa-ui
            script: test:staging:mfa-ui
            extra_env:
              RUN_MFA_UI_TESTS: '1'
          - suite: stripe
            script: test:staging:stripe
            extra_env:
              RUN_STRIPE_TESTS: '1'
          - suite: admin
            script: test:staging:admin
            extra_env:
              RUN_ADMIN_TESTS: '1'
              SKIP_APP_TEST_USER_SETUP: '1'

    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://staging.domain-provider.cosy-hosting.net' }}
      STAGING_AUTH_USERNAME: ${{ secrets.STAGING_AUTH_USERNAME }}
      STAGING_AUTH_PASSWORD: ${{ secrets.STAGING_AUTH_PASSWORD }}
      MAIL_SERVICE_API_KEY: ${{ secrets.MAIL_SERVICE_API_KEY }}
      ADMIN_PORTAL_API_KEY: ${{ secrets.ADMIN_PORTAL_API_KEY }}
      TEST_USER_SETUP_MAIL_TIMEOUT_MS: '120000'
      # Fixture-User-Credentials nur für default/stripe — leerer String für alle anderen
      # Suites, damit setupFixtureTestUser dort gar nicht erst aufgerufen wird.
      # secrets.* darf nicht in matrix.include benutzt werden (GitHub-Actions-Limit),
      # deshalb hier auf Job-Level mit matrix.suite-Conditional.
      USE_FIXTURE_USER: ${{ (matrix.suite == 'default' || matrix.suite == 'stripe') && vars.USE_FIXTURE_USERS || '' }}
      FIXTURE_USER_EMAIL: ${{ (matrix.suite == 'default' && secrets.FIXTURE_USER_DEFAULT_EMAIL) || (matrix.suite == 'stripe' && secrets.FIXTURE_USER_STRIPE_EMAIL) || '' }}
      FIXTURE_USER_USERNAME: ${{ (matrix.suite == 'default' && secrets.FIXTURE_USER_DEFAULT_USERNAME) || (matrix.suite == 'stripe' && secrets.FIXTURE_USER_STRIPE_USERNAME) || '' }}
      FIXTURE_USER_PASSWORD: ${{ (matrix.suite == 'default' && secrets.FIXTURE_USER_DEFAULT_PASSWORD) || (matrix.suite == 'stripe' && secrets.FIXTURE_USER_STRIPE_PASSWORD) || '' }}
      FIXTURE_USER_MFA_SECRET: ${{ (matrix.suite == 'default' && secrets.FIXTURE_USER_DEFAULT_MFA_SECRET) || (matrix.suite == 'stripe' && secrets.FIXTURE_USER_STRIPE_MFA_SECRET) || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run ${{ matrix.suite }} suite
        env: ${{ matrix.extra_env }}
        run: npm run ${{ matrix.script }}

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.suite }}
          path: playwright-report/
          retention-days: 7

      - name: Upload traces, videos and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.suite }}
          path: test-results/
          retention-days: 7
