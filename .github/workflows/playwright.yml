name: Playwright Tests (Staging)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

concurrency:
  group: playwright-staging
  cancel-in-progress: false

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://staging.domain-provider.cosy-hosting.net' }}
      STAGING_AUTH_USERNAME: ${{ secrets.STAGING_AUTH_USERNAME }}
      STAGING_AUTH_PASSWORD: ${{ secrets.STAGING_AUTH_PASSWORD }}
      MAIL_SERVICE_API_KEY: ${{ secrets.MAIL_SERVICE_API_KEY }}
      ADMIN_PORTAL_API_KEY: ${{ secrets.ADMIN_PORTAL_API_KEY }}
      RUN_MAIL_FLOW_TESTS: '1'
      RUN_MFA_UI_TESTS: '1'
      RUN_STRIPE_TESTS: '1'
      RUN_ADMIN_TESTS: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:staging

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload traces, videos and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
